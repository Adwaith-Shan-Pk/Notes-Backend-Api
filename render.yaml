services:
  - type: web
    name: notes-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free

    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        sync: false  

      - key: SECRET_KEY
        generateValue: true  

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7

      - key: APP_ENV
        value: production

      - key: APP_HOST
        value: 0.0.0.0

      - key: APP_PORT
        value: 8000